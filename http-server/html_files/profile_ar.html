<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتشف موارد الشبكة</title>
    <link rel="stylesheet" href="../css_files/mySite_1221381_ar.css">
</head>
<body>
    <div class="network-search-container">
        <div class="digital-wave"></div>
        <h2>مكتشف موارد الشبكة</h2>

        <div class="file-type-selector">
            <div class="type-option active">كل الملفات</div>
            <div class="type-option">الصور</div>
            <div class="type-option">الفيديوهات</div>
        </div>

        <form action="/myform.html" method="get" class="search-form">
            <input type="text" id="filename" name="image_name" placeholder="ابحث عن router.jpg، tcp_handshake.mp4..." required autocomplete="off">
            <button type="submit">ابحث</button>
        </form>
    </div>

    <script>
        document.querySelectorAll('.type-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
                const input = document.getElementById('filename');
                if(this.textContent === 'الصور') {
                    input.placeholder = 'ابحث عن صور الشبكات (مثل router.jpg)';
                } else if(this.textContent === 'الفيديوهات') {
                    input.placeholder = 'ابحث عن فيديوهات الشبكات (مثل tcp_handshake.mp4)';
                } else {
                    input.placeholder = 'ابحث عن router.jpg، tcp_handshake.mp4...';
                }
            });
        });
    </script>
</body>
</html>
