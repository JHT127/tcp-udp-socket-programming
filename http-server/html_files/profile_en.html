<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Resource Finder</title>
    <link rel="stylesheet" href="../css_files/mySite_1221381_en.css">
</head>
<body>
    <div class="network-search-container">
        <div class="digital-wave"></div>
        <h2>Network Resource Finder</h2>

        <div class="file-type-selector">
            <div class="type-option active">All Files</div>
            <div class="type-option">Images</div>
            <div class="type-option">Videos</div>
        </div>

        <form action="/myform.html" method="get" class="search-form">
            <input type="text" id="filename" name="image_name" placeholder="Search for router.jpg, tcp_handshake.mp4..." required autocomplete="off">
            <button type="submit">Find</button>
        </form>
    </div>

    <script>
        document.querySelectorAll('.type-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
                const input = document.getElementById('filename');
                if(this.textContent === 'Images') {
                    input.placeholder = 'Search for network images (e.g. router.jpg)';
                } else if(this.textContent === 'Videos') {
                    input.placeholder = 'Search for network videos (e.g. tcp_handshake.mp4)';
                } else {
                    input.placeholder = 'Search for router.jpg, tcp_handshake.mp4...';
                }
            });
        });
    </script>
</body>
</html>
